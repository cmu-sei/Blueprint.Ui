<div mat-dialog-container>
  <div mat-dialog-title>
    <div class="title-wrapper">
      <mat-icon class="title-icon" [fontIcon]="data.icon"></mat-icon>
      <span>{{data.title}}</span>
    </div>
    <button
      mat-icon-button
      (click)="close()"
      title="Close"
      class="close-button"
      tabindex="-1">
      <mat-icon class="mdi-24px" fontIcon="mdi-close-circle-outline"></mat-icon>
    </button>
  </div>

  <div mat-dialog-content>
    <p class="description">{{data.description}}</p>

    <div class="section">
      <h3 class="section-title">Key Features</h3>
      <ul class="feature-list">
        @for (feature of data.features; track feature) {
          <li class="feature-item">
            <mat-icon class="check-icon" fontIcon="mdi-check-circle"></mat-icon>
            <span>{{feature}}</span>
          </li>
        }
      </ul>
    </div>

    <div class="section">
      <h3 class="section-title">Benefits</h3>
      <ul class="benefit-list">
        @for (benefit of data.benefits; track benefit) {
          <li class="benefit-item">
            <mat-icon class="arrow-icon" fontIcon="mdi-arrow-right"></mat-icon>
            <span>{{benefit}}</span>
          </li>
        }
      </ul>
    </div>
  </div>

  <mat-dialog-actions>
    <button mat-button (click)="close()">Close</button>
  </mat-dialog-actions>
</div>
