<div mat-dialog-container>
  <div mat-dialog-title>
    @if (data.level.id) {
      <span>Edit</span>
    }
    @if (!data.level.id) {
      <span>Create</span>
    }
    Proficiency Level
    &nbsp;
    <button
      mat-icon-button
      (click)="handleEditComplete(false)"
      title="Cancel"
      class="close-button"
      tabindex="-1"
      >
      <mat-icon class="mdi-24px self-center" fontIcon="mdi-close-circle-outline"></mat-icon>
    </button>
  </div>
  @if (!!data && data.level !== undefined && data.level !== null) {
    <div mat-dialog-content>
      <div class="add-margin">
        <div>
          <mat-form-field class="full-width">
            <mat-label>Name</mat-label>
            <input
              type="text"
              title="The Name of the Proficiency Level (e.g. Beginner, Intermediate, Expert)"
              matInput
              placeholder="Name (required)"
              [(ngModel)]="data.level.name">
          </mat-form-field>
        </div>
      </div>
      <div class="add-margin">
        <div>
          <mat-form-field class="full-width">
            <mat-label>Value</mat-label>
            <input
              type="number"
              title="The numeric value of the level"
              matInput
              placeholder="Value"
              [(ngModel)]="data.level.value">
          </mat-form-field>
        </div>
      </div>
      <div class="add-margin">
        <div>
          <mat-form-field class="full-width">
            <mat-label>Display Order</mat-label>
            <input
              type="number"
              title="The display order of the level"
              matInput
              placeholder="Display Order"
              [(ngModel)]="data.level.displayOrder">
          </mat-form-field>
        </div>
      </div>
      <div class="add-margin">
        <div>
          <mat-form-field class="full-width">
            <mat-label>Description</mat-label>
            <input
              type="text"
              title="The Description of the Proficiency Level"
              matInput
              placeholder="Description"
              [(ngModel)]="data.level.description">
          </mat-form-field>
        </div>
      </div>
      <div class="cssLayoutRowStartCenter bottom-button">
        <div class="delete-button">
          <button mat-stroked-button (click)="handleEditComplete(true)" [disabled]="!errorFree()" style="margin-left: 40px;">Save</button>
        </div>
        <div class="delete-button">
          <button mat-stroked-button (click)="handleEditComplete(false)">Cancel</button>
        </div>
      </div>
    </div>
  }
