<div mat-dialog-container>
  <div mat-dialog-title>
    @if (data.competencyFramework.id) {
      <span>Edit</span>
    }
    @if (!data.competencyFramework.id) {
      <span>Create</span>
    }
    Competency Framework
    &nbsp;
    <button
      mat-icon-button
      (click)="handleEditComplete(false)"
      title="Cancel"
      class="close-button"
      tabindex="-1"
      >
      <mat-icon class="mdi-24px self-center" fontIcon="mdi-close-circle-outline"></mat-icon>
    </button>
  </div>
  @if (!!data && data.competencyFramework !== undefined && data.competencyFramework !== null) {
    <div mat-dialog-content>
      <div class="add-margin">
        <div>
          <mat-form-field class="full-width">
            <mat-label>Name</mat-label>
            <input
              type="text"
              title="The Name of the Competency Framework"
              matInput
              placeholder="Name (required)"
              [(ngModel)]="data.competencyFramework.name">
          </mat-form-field>
        </div>
      </div>
      <div class="add-margin">
        <div>
          <mat-form-field class="full-width">
            <mat-label>Version</mat-label>
            <input
              type="text"
              title="The Version of the Competency Framework"
              matInput
              placeholder="Version"
              [(ngModel)]="data.competencyFramework.version">
          </mat-form-field>
        </div>
      </div>
      <div class="add-margin">
        <div>
          <mat-form-field class="full-width">
            <mat-label>Source</mat-label>
            <input
              type="text"
              title="The Source of the Competency Framework (e.g. NICE, DCWF)"
              matInput
              placeholder="Source (e.g. NICE, DCWF)"
              [(ngModel)]="data.competencyFramework.source">
          </mat-form-field>
        </div>
      </div>
      <div class="add-margin">
        <div>
          <mat-form-field class="full-width">
            <mat-label>Description</mat-label>
            <input
              type="text"
              title="The Description of the Competency Framework"
              matInput
              placeholder="Description"
              [(ngModel)]="data.competencyFramework.description">
          </mat-form-field>
        </div>
      </div>
      <div class="cssLayoutRowStartCenter bottom-button">
        <div class="delete-button">
          <button mat-stroked-button (click)="handleEditComplete(true)" [disabled]="!errorFree()" style="margin-left: 40px;">Save</button>
        </div>
        <div class="delete-button">
          <button mat-stroked-button (click)="handleEditComplete(false)">Cancel</button>
        </div>
      </div>
    </div>
  }
