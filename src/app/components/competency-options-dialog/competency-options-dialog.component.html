<div mat-dialog-title>
  Manage Competencies ({{ data.dataOptions.length }})
  <button mat-icon-button (click)="handleClose()" title="Close" class="close-button" tabindex="-1">
    <mat-icon class="mdi-24px self-center" fontIcon="mdi-close-circle-outline"></mat-icon>
  </button>
</div>

<div mat-dialog-content>
  <!-- Search Box -->
  <div class="search-section">
    <mat-form-field class="full-width">
      <mat-label>Search competencies</mat-label>
      <input matInput [(ngModel)]="searchText" placeholder="Filter by ID or description">
      @if (searchText) {
      <button matSuffix mat-icon-button (click)="searchText = ''" title="Clear search">
        <mat-icon fontIcon="mdi-close"></mat-icon>
      </button>
      }
    </mat-form-field>
  </div>

  <!-- Action Buttons -->
  @if (data.canEdit) {
  <div class="action-buttons">
    <button mat-icon-button (click)="handleAdd()" title="Add new competency" style="outline: none;">
      <mat-icon class="mdi-24px" fontIcon="mdi-plus-circle-outline"></mat-icon>
    </button>
    <button mat-icon-button (click)="handleImport()" title="Import competencies from file" style="outline: none;">
      <mat-icon class="mdi-24px" fontIcon="mdi-upload"></mat-icon>
    </button>
  </div>
  }

  <!-- Existing Options Table -->
  <div class="options-table-container">
    <mat-table [dataSource]="filteredOptions" matSort matSortActive="displayOrder" matSortDirection="asc" (matSortChange)="onSortChange($event)">
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef class="actions-column"></mat-header-cell>
        <mat-cell *matCellDef="let option" class="actions-column">
          <button mat-icon-button (click)="handleEdit(option)" title="Edit">
            <mat-icon class="mdi-18px" fontIcon="mdi-square-edit-outline"></mat-icon>
          </button>
          <button mat-icon-button (click)="handleDelete(option)" title="Delete">
            <mat-icon class="mdi-18px" fontIcon="mdi-trash-can-outline"></mat-icon>
          </button>
        </mat-cell>
      </ng-container>
      <ng-container matColumnDef="displayOrder">
        <mat-header-cell *matHeaderCellDef mat-sort-header class="order-column">Order</mat-header-cell>
        <mat-cell *matCellDef="let option" class="order-column">{{ option.displayOrder }}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="optionName">
        <mat-header-cell *matHeaderCellDef mat-sort-header class="name-column">ID</mat-header-cell>
        <mat-cell *matCellDef="let option" class="name-column">{{ option.optionName }}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="optionValue">
        <mat-header-cell *matHeaderCellDef mat-sort-header class="value-column">Name</mat-header-cell>
        <mat-cell *matCellDef="let option" class="value-column">{{ option.optionValue }}</mat-cell>
      </ng-container>
      <ng-container matColumnDef="optionDescription">
        <mat-header-cell *matHeaderCellDef mat-sort-header class="description-column">Description</mat-header-cell>
        <mat-cell *matCellDef="let option" class="description-column">{{ option.optionDescription }}</mat-cell>
      </ng-container>
      <mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
    </mat-table>
  </div>
</div>

<div mat-dialog-actions>
  <div style="flex: 1;"></div>
  <button mat-raised-button color="primary" (click)="handleClose()">Close</button>
</div>
